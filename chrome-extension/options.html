<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebIntel Settings</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0f1117;
      color: #e1e4ea;
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: #161822;
      border-radius: 16px;
      padding: 32px;
      max-width: 480px;
      width: 100%;
      border: 1px solid #1e2030;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }
    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 18px;
      color: #fff;
    }
    .logo-text {
      font-weight: 700;
      font-size: 20px;
      color: #f0f2f8;
    }
    .form-group { margin-bottom: 20px; }
    label {
      display: block;
      font-weight: 600;
      font-size: 13px;
      color: #8b8fa7;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input {
      width: 100%;
      padding: 10px 14px;
      background: #0f1117;
      border: 1px solid #1e2030;
      border-radius: 8px;
      color: #e1e4ea;
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #6366f1; }
    input::placeholder { color: #3b3f54; }
    .hint {
      font-size: 12px;
      color: #6b6f82;
      margin-top: 4px;
    }
    .hint a { color: #6366f1; text-decoration: none; }
    .hint a:hover { text-decoration: underline; }
    .actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }
    .btn {
      flex: 1;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary { background: #6366f1; color: #fff; }
    .btn-primary:hover { background: #4f46e5; }
    .btn-secondary { background: #1e2030; color: #e1e4ea; }
    .btn-secondary:hover { background: #2a2d3a; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .status {
      margin-top: 16px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
    }
    .status.success { display: block; background: rgba(52, 211, 153, 0.1); color: #34d399; border: 1px solid rgba(52, 211, 153, 0.2); }
    .status.error { display: block; background: rgba(248, 113, 113, 0.1); color: #f87171; border: 1px solid rgba(248, 113, 113, 0.2); }
    .status.loading { display: block; background: rgba(99, 102, 241, 0.1); color: #8b9cf6; border: 1px solid rgba(99, 102, 241, 0.2); }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <div class="logo-icon">W</div>
      <span class="logo-text">WebIntel Settings</span>
    </div>

    <div class="form-group">
      <label for="apiKey">API Key</label>
      <input type="password" id="apiKey" placeholder="sk-..." autocomplete="off" />
      <div class="hint">Get your API key at <a href="https://dash.webintel.diyaaaa.in" target="_blank">dash.webintel.diyaaaa.in</a></div>
    </div>

    <div class="form-group">
      <label for="baseUrl">Base URL</label>
      <input type="url" id="baseUrl" placeholder="https://webintel.diyaaaa.in" />
      <div class="hint">API base URL (change only if self-hosting)</div>
    </div>

    <div class="actions">
      <button class="btn btn-secondary" id="testBtn">Test Connection</button>
      <button class="btn btn-primary" id="saveBtn">Save</button>
    </div>

    <div class="status" id="status"></div>
  </div>

  <script src="options.js"></script>
</body>
</html>
